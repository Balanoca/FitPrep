<h2 mat-dialog-title>{{ esEdicion ? 'Editar insumo' : 'Nuevo insumo' }}</h2>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content class="space-y-4 !pt-2">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Pechuga de pollo" />
      @if (form.controls.nombre.hasError('required') && form.controls.nombre.touched) {
        <mat-error>El nombre es obligatorio</mat-error>
      }
    </mat-form-field>

    <div class="grid grid-cols-2 gap-3">
      <mat-form-field appearance="outline">
        <mat-label>Unidad</mat-label>
        <mat-select formControlName="unidad">
          @for (u of unidades; track u) {
            <mat-option [value]="u">{{ u }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio por unidad</mat-label>
        <input matInput type="number" formControlName="precioUnitario" placeholder="14.00" />
        <span matTextPrefix>S/&nbsp;</span>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">
      {{ esEdicion ? 'Guardar' : 'Crear' }}
    </button>
  </mat-dialog-actions>
</form>
